services:
  web:
    build:
      context: .
      dockerfile: Dockerfile
    image: nurse-scheduler-web:latest
    ports:
      - "${HOST_PORT:-3000}:3000"
    environment:
      NODE_ENV: production
      PYTHON_EXECUTABLE: python3
      HOSTNAME: 0.0.0.0
      PORT: "3000"
    restart: unless-stopped
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "require('http').get('http://127.0.0.1:3000',(r)=>process.exit(r.statusCode<500?0:1)).on('error',()=>process.exit(1))",
        ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
